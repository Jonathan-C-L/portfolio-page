<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- script includes must occur as the latter is dependent on the former -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <script type="module" src="index.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Jonathan Le - Portfolio</title>
</head>
<body>
    <!-- ─── NAV ─── -->
    <nav>
        <div class="nav-logo">JL<span class="cursor">.</span></div>
        <ul class="nav-links" id="nav-links">
            <!-- <li><a onclick="showSection('about')">About</a></li>
            <li><a onclick="showSection('projects')">Projects</a></li>
            <li><a onclick="showSection('contact')">Contact</a></li> -->
        </ul>
    </nav>

    <!-- ─── HERO ─── -->
    <section id="hero">
        <div class="hero-tag fade-in">Software Developer</div>
            <h1 class="hero-name fade-in crt">Jonathan<br><em>Le</em></h1>
            <p class="hero-desc fade-in">
                <i>"We are what we repeatedly do. Exellence, then, is not an act, but a habit" -Will Durant</i>
            </p>
            <div class="hero-ctas fade-in">
            <button class="btn btn-primary" onclick="showSection('projects')">View Projects</button>
            <button class="btn btn-ghost" onclick="showSection('contact')">Get in Touch</button>
        </div>
        <div class="hero-badge">
        <div class="dot"></div>
        Open to opportunities
        </div>
    </section>

    <hr class="divider">

    <!-- ─── ABOUT ─── -->
    <section id="about">
        <div class="section-label">Background</div>
        <h2 class="section-title fade-in">About Me</h2>
        <div class="about-grid fade-in">
        <div class="about-text" id="about-text-content"></div>
        <div class="skills-block" id="skills-block"></div>
        </div>
    </section>

    <hr class="divider">

    <!-- ─── PROJECTS ─── -->
    <section id="projects">
        <div class="section-label">Work</div>
        <h2 class="section-title fade-in">Projects</h2>
        <div class="projects-grid fade-in" id="projects-grid"></div>
    </section>

    <hr class="divider">

    <!-- ─── CONTACT ─── -->
    <section id="contact">
        <div class="section-label">Reach Out</div>
        <h2 class="section-title fade-in">Contact</h2>
        <div class="contact-card fade-in" id="contact-card"></div>
    </section>

    <!-- ─── FOOTER ─── -->
    <footer id="footer">
        <span>© 2025 Jonathan Le</span>
        <span>Blink Effect: <a href="https://codepen.io/thisanimus/pen/OJpaqWz" target="_blank">@thisanimus</a></span>
    </footer>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>
</body>
</html>
